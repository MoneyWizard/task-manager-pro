<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro - Full Stack Demo</title>
    <style>
        :root {
            --color-white: rgba(255, 255, 255, 1);
            --color-black: rgba(0, 0, 0, 1);
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-gray-300: rgba(167, 169, 169, 1);
            --color-gray-400: rgba(119, 124, 124, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-brown-600: rgba(94, 82, 64, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-slate-900: rgba(19, 52, 59, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
            --color-teal-400: rgba(45, 166, 178, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-teal-700: rgba(26, 104, 115, 1);
            --color-red-400: rgba(255, 84, 89, 1);
            --color-red-500: rgba(192, 21, 47, 1);
            --color-brown-600-rgb: 94, 82, 64;
            --color-teal-500-rgb: 33, 128, 141;
            --color-slate-900-rgb: 19, 52, 59;
            --color-gray-400-rgb: 119, 124, 124;
            --color-teal-300-rgb: 50, 184, 198;
            --color-background: var(--color-cream-50);
            --color-surface: var(--color-cream-100);
            --color-text: var(--color-slate-900);
            --color-text-secondary: var(--color-slate-500);
            --color-primary: var(--color-teal-500);
            --color-primary-hover: var(--color-teal-600);
            --color-primary-active: var(--color-teal-700);
            --color-border: rgba(var(--color-brown-600-rgb), 0.2);
            --color-error: var(--color-red-500);
            --color-success: var(--color-teal-500);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            --radius-base: 8px;
            --radius-lg: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background: var(--color-charcoal-700);
                --color-surface: var(--color-charcoal-800);
                --color-text: var(--color-gray-200);
                --color-text-secondary: rgba(var(--color-gray-300-rgb), 0.7);
                --color-primary: var(--color-teal-300);
                --color-primary-hover: var(--color-teal-400);
                --color-border: rgba(var(--color-gray-400-rgb), 0.3);
                --color-error: var(--color-red-400);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: var(--color-primary);
            font-size: 24px;
            font-weight: 600;
        }

        .auth-section {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .auth-section h2 {
            margin-bottom: 20px;
            color: var(--color-text);
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--color-text);
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-background);
            color: var(--color-text);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-base);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            padding: 8px 16px;
        }

        .btn-secondary:hover {
            background: rgba(var(--color-teal-500-rgb), 0.1);
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
            padding: 8px 16px;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .text-link {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .text-link a {
            color: var(--color-primary);
            text-decoration: none;
            cursor: pointer;
        }

        .text-link a:hover {
            text-decoration: underline;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .hidden {
            display: none !important;
        }

        .dashboard {
            display: grid;
            gap: 30px;
        }

        .add-task-form {
            background: var(--color-surface);
            padding: 25px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .add-task-form h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .tasks-container {
            display: grid;
            gap: 15px;
        }

        .task-card {
            background: var(--color-surface);
            padding: 20px;
            border-radius: var(--radius-base);
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--color-primary);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .task-card.completed {
            opacity: 0.7;
            border-left-color: var(--color-success);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .task-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--color-text);
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
        }

        .task-description {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.pending {
            background: rgba(var(--color-teal-500-rgb), 0.15);
            color: var(--color-primary);
        }

        .status-badge.completed {
            background: rgba(var(--color-teal-500-rgb), 0.15);
            color: var(--color-success);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--color-text);
        }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-base);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(var(--color-red-500), 0.1);
            color: var(--color-error);
            border: 1px solid var(--color-error);
        }

        .alert-success {
            background: rgba(var(--color-teal-500-rgb), 0.1);
            color: var(--color-success);
            border: 1px solid var(--color-success);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .task-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="authView" class="auth-section">
        <h2>Welcome to Task Manager Pro</h2>
        <p style="text-align: center; color: var(--color-text-secondary); font-size: 13px; margin-bottom: 20px;">
            🚀 Deployed on GitHub Pages + Cloudflare
        </p>
        <div id="authMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
            <div class="text-link">
                Don't have an account? <a id="showRegister">Create one</a>
            </div>
        </form>

        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" required placeholder="Min. 8 characters">
            </div>
            <div class="form-group">
                <label for="registerConfirm">Confirm Password</label>
                <input type="password" id="registerConfirm" required placeholder="Confirm password">
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
            <div class="text-link">
                Already have an account? <a id="showLogin">Sign in</a>
            </div>
        </form>
    </div>

    <div id="appView" class="hidden">
        <header>
            <div class="header-content">
                <h1>📋 Task Manager Pro</h1>
                <div class="user-info">
                    <span class="user-email" id="userEmail"></span>
                    <button class="btn btn-secondary" id="logoutBtn">Logout</button>
                </div>
            </div>
        </header>

        <div class="container dashboard">
            <div class="add-task-form">
                <h2>Add New Task</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" required placeholder="What needs to be done?">
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" placeholder="Add details..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
            </div>

            <div>
                <h2 style="margin-bottom: 20px;">Your Tasks</h2>
                <div id="tasksContainer" class="tasks-container">
                    <div class="empty-state">
                        <h3>No tasks yet</h3>
                        <p>Create your first task above to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentUser: null,
            users: [],
            tasks: []
        };

        function showMessage(elementId, message, isError = false) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 4000);
        }

        function loadData() {
            try {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
                const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                
                state.users = users;
                state.tasks = tasks;
                state.currentUser = currentUser;
            } catch (error) {
                console.error('Storage error:', error);
                state.users = [];
                state.tasks = [];
                state.currentUser = null;
            }
        }

        function saveData() {
            try {
                localStorage.setItem('users', JSON.stringify(state.users));
                localStorage.setItem('tasks', JSON.stringify(state.tasks));
                localStorage.setItem('currentUser', JSON.stringify(state.currentUser));
            } catch (error) {
                console.error('Failed to save data:', error);
                alert('Unable to save data. Storage may be full or disabled.');
            }
        }

        function register(email, password) {
            const exists = state.users.find(u => u.email === email);
            if (exists) {
                throw new Error('User already exists');
            }

            const user = {
                id: Date.now().toString(),
                email,
                password: btoa(password),
                createdAt: new Date().toISOString()
            };

            state.users.push(user);
            saveData();
            return user;
        }

        function login(email, password) {
            const user = state.users.find(u => u.email === email && atob(u.password) === password);
            if (!user) {
                throw new Error('Invalid credentials');
            }

            state.currentUser = { id: user.id, email: user.email };
            saveData();
            return user;
        }

        function logout() {
            state.currentUser = null;
            saveData();
            showAuthView();
        }

        function addTask(title, description) {
            const task = {
                id: Date.now().toString(),
                userId: state.currentUser.id,
                title,
                description,
                completed: false,
                createdAt: new Date().toISOString()
            };

            state.tasks.push(task);
            saveData();
            return task;
        }

        function toggleTask(taskId) {
            const task = state.tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveData();
                renderTasks();
            }
        }

        function deleteTask(taskId) {
            state.tasks = state.tasks.filter(t => t.id !== taskId);
            saveData();
            renderTasks();
        }

        function getUserTasks() {
            return state.tasks.filter(t => t.userId === state.currentUser.id);
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const tasks = getUserTasks();

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks yet</h3>
                        <p>Create your first task above to get started!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
                .map(task => `
                    <div class="task-card ${task.completed ? 'completed' : ''}">
                        <div class="task-header">
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            <span class="status-badge ${task.completed ? 'completed' : 'pending'}">
                                ${task.completed ? 'Completed' : 'Pending'}
                            </span>
                        </div>
                        ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                        <div class="task-actions">
                            <button class="btn btn-secondary" onclick="toggleTask('${task.id}')">
                                ${task.completed ? 'Mark Incomplete' : 'Mark Complete'}
                            </button>
                            <button class="btn btn-danger" onclick="deleteTask('${task.id}')">
                                Delete
                            </button>
                        </div>
                    </div>
                `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showAuthView() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');
        }

        function showAppView() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('appView').classList.remove('hidden');
            document.getElementById('userEmail').textContent = state.currentUser.email;
            renderTasks();
        }

        document.getElementById('showRegister').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        });

        document.getElementById('showLogin').addEventListener('click', () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;

            if (password !== confirm) {
                showMessage('authMessage', 'Passwords do not match', true);
                return;
            }

            if (password.length < 8) {
                showMessage('authMessage', 'Password must be at least 8 characters', true);
                return;
            }

            try {
                register(email, password);
                showMessage('authMessage', 'Account created! Please sign in.');
                document.getElementById('registerForm').reset();
                document.getElementById('showLogin').click();
            } catch (error) {
                showMessage('authMessage', error.message, true);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                login(email, password);
                showAppView();
            } catch (error) {
                showMessage('authMessage', error.message, true);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', logout);

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;

            addTask(title, description);
            document.getElementById('taskForm').reset();
            renderTasks();
        });

        loadData();
        if (state.currentUser) {
            showAppView();
        } else {
            showAuthView();
        }
    </script>
</body>
</html>
